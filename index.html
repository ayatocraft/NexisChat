<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NEXIS</title>
<script src="https://cdn.ably.io/lib/ably.min-1.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0f0f14;
  color:white;
}
header{
  padding:16px;
  text-align:center;
  font-weight:600;
  font-size:20px;
  background:#111;
}
.container{padding:16px;}
input,button{
  padding:10px;
  border:none;
  border-radius:8px;
  font-size:14px;
}
button{
  background:#5b7cff;
  color:white;
}
#chat{
  height:55vh;
  overflow-y:auto;
  margin:12px 0;
}
.msg{
  padding:8px 12px;
  margin:6px 0;
  border-radius:12px;
  max-width:75%;
  word-break:break-word;
}
.me{background:#5b7cff;margin-left:auto;}
.other{background:#2a2a35;}
.row{display:flex;gap:8px;}
#qr{margin:12px 0;}
.small{font-size:12px;opacity:0.6;}
</style>
</head>
<body>

<header>NEXIS</header>
<div class="container">

<div id="setup">
  <h3>初期設定</h3>
  <input id="nameInput" placeholder="あなたの名前">
  <button onclick="saveName()">保存</button>
</div>

<div id="main" style="display:none">

  <div>
    <div class="small">あなたのQR（友達に見せる）</div>
    <div id="qr"></div>
  </div>

  <hr>

  <div>
    <input id="friendIdInput" placeholder="友達IDを貼り付け">
    <button onclick="addFriend()">追加</button>
  </div>

  <div id="chat"></div>

  <div class="row">
    <input id="msgInput" placeholder="メッセージ" style="flex:1">
    <button onclick="sendMsg()">送信</button>
  </div>

  <button onclick="clearChat()" style="margin-top:10px;background:#ff4d4d">
    チャット削除
  </button>

</div>
</div>

<script>
/* =========================
   🔑 APIキーをここに入れる
========================= */
const API_KEY = "JW3Hvw.fw1o0A:-zV3VatQkBUx-hVmtwFGE6Bwbv_wG4kIoz7LHOKNawY";

/* ========================= */

let myName = localStorage.getItem("nexis_name");
let myId = localStorage.getItem("nexis_id");
let friendId = localStorage.getItem("nexis_friend");
let channel;
let ably;

if(!myId){
  myId = crypto.randomUUID();
  localStorage.setItem("nexis_id", myId);
}

if(myName){
  init();
}else{
  document.getElementById("setup").style.display="block";
}

function saveName(){
  const name = document.getElementById("nameInput").value.trim();
  if(!name) return;
  localStorage.setItem("nexis_name", name);
  myName = name;
  init();
}

function init(){
  document.getElementById("setup").style.display="none";
  document.getElementById("main").style.display="block";

  new QRCode(document.getElementById("qr"), myId);

  if(API_KEY === "YOUR_ABLY_API_KEY"){
    alert("Ably APIキーを入力してください");
    return;
  }

  ably = new Ably.Realtime(API_KEY);

  if(friendId){
    connectChannel();
  }
}

function addFriend(){
  const id = document.getElementById("friendIdInput").value.trim();
  if(!id) return;
  localStorage.setItem("nexis_friend", id);
  friendId = id;
  connectChannel();
}

function connectChannel(){
  const room = [myId, friendId].sort().join("-");
  channel = ably.channels.get(room);

  channel.subscribe((msg)=>{
    if(msg.data.sender === myId) return;
    addMessage(msg.data.text, false);
    saveLocal(msg.data.text, false);
  });

  loadLocal();
}

function sendMsg(){
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if(!text || !channel) return;

  channel.publish("message", {
    sender: myId,
    text: text
  });

  addMessage(text, true);
  saveLocal(text, true);
  input.value="";
}

function addMessage(text, mine){
  const div = document.createElement("div");
  div.className = "msg " + (mine ? "me":"other");
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;
}

function saveLocal(text, mine){
  let history = JSON.parse(localStorage.getItem("nexis_chat") || "[]");
  history.push({text, mine});
  localStorage.setItem("nexis_chat", JSON.stringify(history));
}

function loadLocal(){
  let history = JSON.parse(localStorage.getItem("nexis_chat") || "[]");
  history.forEach(m=>{
    addMessage(m.text, m.mine);
  });
}

function clearChat(){
  localStorage.removeItem("nexis_chat");
  document.getElementById("chat").innerHTML="";
}
</script>

</body>
</html>
