<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexis Chat</title>

<script src="https://cdn.ably.io/lib/ably.min-1.js"></script>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

<style>
body{margin:0;font-family:-apple-system;background:#0f0f14;color:white}
header{padding:15px;text-align:center;font-size:20px;background:#111}
.container{padding:15px}
input,button{padding:10px;border:none;border-radius:8px;font-size:14px}
button{background:#5b7cff;color:white}
.friend{background:#1a1a22;padding:10px;border-radius:8px;margin:6px 0}
.msg{padding:8px 12px;margin:3px 0;border-radius:12px;max-width:70%}
.me{background:#5b7cff;margin-left:auto}
.other{background:#2a2a35}
.hidden{display:none}
.row{display:flex;gap:6px}
.small{font-size:11px;opacity:0.6}
</style>
</head>
<body>

<header>Nexis Chat</header>
<div class="container">

<div id="setup">
  <h3>名前入力</h3>
  <input id="nameInput">
  <button onclick="saveName()">開始</button>
</div>

<div id="app" class="hidden">

<h3>友達追加</h3>
<div class="row">
  <input id="friendIdInput" placeholder="相手ID">
  <button onclick="addFriend()">追加</button>
</div>

<h3>友達</h3>
<div id="friendList"></div>

<hr>

<div id="chatScreen" class="hidden">
  <button onclick="back()">←戻る</button>
  <h3 id="chatTitle"></h3>

  <div id="chat" style="height:45vh;overflow:auto"></div>

  <div class="row">
    <input id="msgInput" style="flex:1">
    <button onclick="sendMsg()">送信</button>
  </div>

  <br>
  <button onclick="openFileDrop()">📁 FileDropで送る</button>
</div>

</div>
</div>

<script>
const API_KEY="JW3Hvw.fw1o0A:-zV3VatQkBUx-hVmtwFGE6Bwbv_wG4kIoz7LHOKNawY";

let myId=localStorage.getItem("nexis_id");
let myName=localStorage.getItem("nexis_name");
let friends=JSON.parse(localStorage.getItem("nexis_friends")||"{}");
let currentFriend=null;
let ably;

if(!myId){
  myId=crypto.randomUUID();
  localStorage.setItem("nexis_id",myId);
}

if(myName){ init(); }
else{ document.getElementById("setup").style.display="block"; }

function saveName(){
  const n=document.getElementById("nameInput").value.trim();
  if(!n)return;
  localStorage.setItem("nexis_name",n);
  myName=n;
  init();
}

function init(){
  document.getElementById("setup").style.display="none";
  document.getElementById("app").classList.remove("hidden");

  ably=new Ably.Realtime(API_KEY);

  const inbox=ably.channels.get("inbox-"+myId);

  inbox.subscribe("message",msg=>{
    const d=msg.data;

    if(!friends[d.sender]){
      friends[d.sender]={name:d.senderName};
      saveFriends();
      renderFriends();
    }

    if(d.system)return;

    saveHistory(d.sender,d,false);

    if(currentFriend===d.sender){
      addMsg(d.text,false);
    }
  });

  renderFriends();
}

function addFriend(){
  const id=document.getElementById("friendIdInput").value.trim();
  if(!id)return;

  if(!friends[id]){
    friends[id]={name:"Friend"};
    saveFriends();
  }

  // system送信（相手側にも必ず保存させる）
  ably.connection.once("connected",()=>{
    ably.channels.get("inbox-"+id).publish("message",{
      sender:myId,
      senderName:myName,
      system:true
    });
  });

  document.getElementById("friendIdInput").value="";
  renderFriends();
}

function saveFriends(){
  localStorage.setItem("nexis_friends",JSON.stringify(friends));
}

function renderFriends(){
  const list=document.getElementById("friendList");
  list.innerHTML="";
  Object.keys(friends).forEach(id=>{
    const div=document.createElement("div");
    div.className="friend";
    div.innerHTML=`
      <strong>${friends[id].name}</strong>
      <div class="small">${id.slice(0,8)}...</div>
      <button onclick="openChat('${id}')">開く</button>
    `;
    list.appendChild(div);
  });
}

function openChat(id){
  currentFriend=id;
  document.getElementById("chatScreen").classList.remove("hidden");
  document.getElementById("chatTitle").innerText=friends[id].name;
  document.getElementById("chat").innerHTML="";
  loadHistory(id);
}

function back(){
  currentFriend=null;
  document.getElementById("chatScreen").classList.add("hidden");
}

function sendMsg(){
  const text=document.getElementById("msgInput").value.trim();
  if(!text||!currentFriend)return;

  const payload={
    sender:myId,
    senderName:myName,
    text:text
  };

  ably.channels.get("inbox-"+currentFriend).publish("message",payload);

  saveHistory(currentFriend,payload,true);
  addMsg(text,true);
  document.getElementById("msgInput").value="";
}

function addMsg(text,mine){
  const div=document.createElement("div");
  div.className="msg "+(mine?"me":"other");
  div.innerText=text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop=999999;
}

function saveHistory(id,data,mine){
  let h=JSON.parse(localStorage.getItem("chat_"+id)||"[]");
  h.push({text:data.text,mine:mine});
  localStorage.setItem("chat_"+id,JSON.stringify(h));
}

function loadHistory(id){
  let h=JSON.parse(localStorage.getItem("chat_"+id)||"[]");
  h.forEach(m=>addMsg(m.text,m.mine));
}

function openFileDrop(){
  if(!currentFriend)return;
  const url="https://ayatocraft.github.io/NexisFileDrop/?to="+currentFriend;
  window.open(url,"_blank");
}

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
